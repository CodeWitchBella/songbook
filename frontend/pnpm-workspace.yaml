allowBuilds:
  "@swc/core": true
  canvas: true
  esbuild: true
packages:
  # Isolated codegen tool: openapi-typescript needs a classic TypeScript, but the
  # app builds against the TypeScript 7 RC (native port) which lacks the Node JS
  # API `exports` the generator imports. A nested package keeps its own TS.
  - "tools/*"
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - "@isbl/ts-utils"
