packages:
  - backend
  - frontend
  # Isolated codegen tool: openapi-typescript needs a classic TypeScript, but the
  # app builds against the TypeScript 7 RC (native port) which lacks the Node JS
  # API `exports` the generator imports. A nested package keeps its own TS.
  - "frontend/tools/*"
allowBuilds:
  "@swc/core": true
  canvas: true
  esbuild: true
catalog:
  react: "^19.2.7"
  react-dom: "^19.2.7"
overrides:
  # react-chords declares react/react-dom as hard deps (^16), which makes pnpm
  # install a second React and triggers the "multiple React versions" error when
  # rendering a chord. It's a pure SVG component, so pin it to the workspace React.
  "@tombatossals/react-chords>react": "catalog:"
  "@tombatossals/react-chords>react-dom": "catalog:"
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - "@isbl/ts-utils"
